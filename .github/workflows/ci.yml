name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: pre-commit
      uses: pre-commit/action@v3.0.0
      with:
        extra_args: --all-files

  clang-tidy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Fetch base branch for diff
      if: github.event_name == 'pull_request'
      run: git fetch origin ${{ github.base_ref }} --depth=1

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install clang-tidy and dependencies
      run: |
        python -m pip install --upgrade pip
        pip install clang-tidy==21.1.0 nanobind

    - name: Run clang-tidy
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          python tests/lint/clang_tidy.py --jobs=$(nproc) --diff-base=origin/${{ github.base_ref }}
        else
          python tests/lint/clang_tidy.py --jobs=$(nproc)
        fi

  unit-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10"]

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: true
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install project and dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install -v .[dev]

    - name: Test unit tests
      run: pytest tests/ut -n auto --maxprocesses 8 -v

  system-tests:
    runs-on: [self-hosted, linux, arm64, npu]
    env:
      ASCEND_HOME_PATH: /usr/local/Ascend/cann-8.5.0
      PTOAS_ROOT: ${{ github.workspace }}/ptoas-bin
      PTOAS_VERSION: v0.32
      PTOAS_SHA256: 325198dff677d7d163e16ce0aed27aa08c119764a4f50a60092b0edcd2e0784b
      CMAKE_BUILD_PARALLEL_LEVEL: 16
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
      CCACHE_DIR: /root/.cache/ccache
      CCACHE_MAXSIZE: 5G
      PIP_CACHE_DIR: /root/.cache/pip
    container:
      image: localhost:5000/ci-device-py310:latest
      options: >-
        --privileged
        -v /usr/local/bin/npu-smi:/usr/local/bin/npu-smi:ro
        -v /usr/local/Ascend:/usr/local/Ascend:ro
        -v /dev:/dev
        -v /home/ci-runner/hw-native-sys-pypto/ci-cache/pip:/root/.cache/pip
        -v /home/ci-runner/hw-native-sys-pypto/ci-cache/ccache:/root/.cache/ccache
        -v /home/ci-runner/hw-native-sys-pypto/ci-cache/ptoas:/opt/ptoas-cache
        -e ASCEND_HOME_PATH=/usr/local/Ascend/cann-8.5.0
        -e DEVICE_ID
        -e DEVICE_RANGE
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Check NPU
        run: |
          npu-smi info

      - name: Show ccache stats (before)
        run: ccache -s || true

      - name: Install project and dependencies
        run: |
          python -m pip install --upgrade pip
          rm -rf ./build ./_skbuild
          test ! -e ./build && test ! -e ./_skbuild && echo "OK: pypto build removed"
          pip install --no-build-isolation .[dev]

      - name: Install ptoas (local cache)
        env:
          PTOAS_CACHE_DIR: /opt/ptoas-cache
        run: |
          CACHE_ARCHIVE="$PTOAS_CACHE_DIR/ptoas-aarch64-${PTOAS_VERSION}-${PTOAS_SHA256}.tar.gz"
          if [ ! -f "$CACHE_ARCHIVE" ]; then
            echo "Cache miss — downloading ptoas ${PTOAS_VERSION}"
            mkdir -p "$PTOAS_CACHE_DIR"
            curl --fail --location --retry 3 --retry-all-errors \
              https://github.com/hw-native-sys/PTOAS/releases/download/${PTOAS_VERSION}/ptoas-bin-aarch64.tar.gz \
              -o "$CACHE_ARCHIVE.tmp"
            echo "${PTOAS_SHA256}  $CACHE_ARCHIVE.tmp" | sha256sum -c -
            mv "$CACHE_ARCHIVE.tmp" "$CACHE_ARCHIVE"
          else
            echo "Cache hit — using $CACHE_ARCHIVE"
          fi
          mkdir -p "$GITHUB_WORKSPACE/ptoas-bin"
          tar -xzf "$CACHE_ARCHIVE" -C "$GITHUB_WORKSPACE/ptoas-bin"
          chmod +x "$GITHUB_WORKSPACE/ptoas-bin/ptoas"
          chmod +x "$GITHUB_WORKSPACE/ptoas-bin/bin/ptoas"

      - name: Add Ascend tools to PATH
        run: echo "/usr/local/Ascend/cann-8.5.0/bin" >> $GITHUB_PATH

      - name: Install simpler
        run: |
          rm -rf ./runtime/build
          ls -la ./runtime/ | grep -q "^d.*build$" && echo "FAIL: build still exists" && exit 1 || echo "OK: build removed"
          pip install --no-build-isolation ./runtime

      - name: Show ccache stats (after)
        run: ccache -s || true

      - name: Test system tests
        timeout-minutes: 15
        run: pytest tests/st -v --device="$DEVICE_RANGE" --precompile-workers=128 --pto-isa-commit=2c607938

      - name: Test swimlane output
        run: |
          pytest tests/st/runtime/test_perf_swimlane.py \
            -v --device="$DEVICE_ID" --platform=a2a3 --runtime-profiling --forked --pto-isa-commit=2c607938

  system-tests-a5sim:
    runs-on: ubuntu-latest
    env:
      PTOAS_ROOT: ${{ github.workspace }}/ptoas-bin
      PTOAS_VERSION: v0.32
      PTOAS_SHA256: 631b19f9112e5533da3585b4ac422a0ab24ba7ac53b7d251c085390335946950
    container:
      image: ghcr.io/hw-native-sys/pypto/github-ci:latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install project and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -v .[dev]

      - name: Cache ptoas binary
        id: cache-ptoas
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/ptoas-bin
          key: ptoas-x86_64-${{ env.PTOAS_VERSION }}-${{ env.PTOAS_SHA256 }}

      - name: Install ptoas
        if: steps.cache-ptoas.outputs.cache-hit != 'true'
        run: |
          curl --fail --location --retry 3 --retry-all-errors \
            https://github.com/hw-native-sys/PTOAS/releases/download/${{ env.PTOAS_VERSION }}/ptoas-bin-x86_64.tar.gz \
             -o /tmp/ptoas-bin-x86_64.tar.gz
          echo "${{ env.PTOAS_SHA256 }}  /tmp/ptoas-bin-x86_64.tar.gz" | sha256sum -c -
          mkdir -p $GITHUB_WORKSPACE/ptoas-bin
          tar -xzf /tmp/ptoas-bin-x86_64.tar.gz -C $GITHUB_WORKSPACE/ptoas-bin
          chmod +x $GITHUB_WORKSPACE/ptoas-bin/ptoas
          chmod +x $GITHUB_WORKSPACE/ptoas-bin/bin/ptoas

      - name: Install simpler
        run: |
          rm -rf ./runtime/build
          pip install -v ./runtime

      - name: Test A5 system tests (simulator)
        run: pytest tests/st/runtime/test_assemble.py tests/st/runtime/test_mscatter.py tests/st/runtime/test_qwen3_decode_scope3_mixed.py tests/st/runtime/test_dyn_orch_shape.py::TestDynOrchShapeOperations::test_dyn_orch_paged_attention -v --platform=a5sim --forked --pto-isa-commit=2c607938

      - name: Test A5 cross-core system tests (simulator)
        run: pytest tests/st/runtime/test_cross_core.py -v --forked --platform=a5sim --pto-isa-commit=2c607938

      - name: Test A2A3 cross-core system tests (simulator)
        run: pytest tests/st/runtime/test_cross_core.py -v --forked --platform=a2a3sim --pto-isa-commit=2c607938

  fuzz-tests-sim:
    runs-on: ubuntu-latest
    continue-on-error: true
    container:
      image: ghcr.io/hw-native-sys/pypto/github-ci:latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install PyPTO
        run: |
          python -m pip install --upgrade pip
          pip install -v .[dev]

      - name: Install simpler
        run: |
          rm -rf ./runtime/build
          pip install -v ./runtime

      - name: Run fuzz tests (sim mode)
        id: run_fuzz
        continue-on-error: true
        run: |
          mkdir -p build/fuzz-artifacts/sim
          cd tests/st/fuzz
          python generate_test.py --num-cases 10 --seed ${{ github.run_number }}
          cd ../../..
          pytest tests/st/fuzz/generated/test_fuzz_multi_kernel.py \
            -v -s --save-kernels --dump-passes \
            --kernels-dir=build/fuzz-artifacts/sim \
            --forked --platform=a2a3sim \
            --junitxml=fuzz-results-sim.xml || true
          python tests/st/fuzz/check_pass_rate.py \
            fuzz-results-sim.xml \
            --threshold 0.7

      - name: Generate warning summary
        if: steps.run_fuzz.outcome == 'failure'
        run: |
          echo "## Fuzz Test Warning" >> $GITHUB_STEP_SUMMARY
          echo "Fuzz tests did not meet the 70% pass rate threshold." >> $GITHUB_STEP_SUMMARY
          echo "**Seed:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "cd tests/st/fuzz && python generate_test.py --num-cases 10 --seed ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "pytest generated/test_fuzz_multi_kernel.py -v --forked --platform=a2a3sim --save-kernels" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR (fuzz warning)
        if: always() && steps.run_fuzz.outcome == 'failure' && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '⚠️ **Fuzz Test Warning**',
              '',
              'Fuzz tests did not meet the 70% pass rate threshold.',
              '',
              `**Seed:** ${context.runNumber}`,
              '',
              'Reproduce locally:',
              '```bash',
              `cd tests/st/fuzz && python generate_test.py --num-cases 10 --seed ${context.runNumber}`,
              'pytest generated/test_fuzz_multi_kernel.py -v --forked --platform=a2a3sim --save-kernels',
              '```',
              '',
              `[View artifacts](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Upload fuzz artifacts
        if: always() && steps.run_fuzz.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts-sim-${{ github.run_id }}
          path: |
            fuzz-results-sim.xml
            build/fuzz-artifacts/
          retention-days: 2
